services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: msd-floorplan-web
    restart: unless-stopped
    # Coolify's reverse proxy (Traefik) routes the domain to this container on the
    # internal network — do NOT publish a host port (causes "port already allocated").
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
